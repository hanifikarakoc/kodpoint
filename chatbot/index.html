<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Kodpoint | Premium Ai Chat Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="/chatbot/assets/img/asistan.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/chatbot/assets/css/normalize.css" />
    <link rel="stylesheet" href="/chatbot/assets/css/style.css" />
</head>
<body>
    <div class="wrapper">
        <div class="chat-wrapper">
            <header class="chat-header">
                <div class="logo-container">
                    <img src="/chatbot/assets/img/asistan.png" alt="Kodpoint AI" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div>
                    <h1>Kodpoint AI</h1>
                    <p><i class="fa-solid fa-circle" style="color: #00d1b2; font-size: 8px; margin-right: 5px;"></i> Çevrimiçi</p>
                </div>
            </header>

            <div class="chat-body" id="chat-container">
                <div class="bot-inbox inbox">
                    <div class="wrap">
                        <div class="icon">
                            <img src="/chatbot/assets/img/asistan.png" alt="AI">
                        </div>
                        <div class="msg-header">
                            <p id="hello-text">
                                Merhaba, Ben Kodpoint ekibi tarafından geliştirilen yapay zeka botuyum. Size nasıl yardımcı olabilirim?
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-bottom">
                <div class="chat-input">
                    <input type="text" id="data" placeholder="Buraya bir şey yazın..." required autocomplete="off" />
                    <button type="submit" id="send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <p class="disclaimer">
                    NOT: Bu bot yapay zeka tarafından oluşturulmuş otomatik yanıtlar üretir.
                </p>
            </div>
        </div>
    </div>

    <div id="preloader">
        <div id="loader"></div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/chatbot/assets/js/t.min.js"></script>
    <script>
        $(window).on("load", function () {
            $("#loader").fadeOut(100, function () {
                $("#preloader").fadeOut(200);
            });
        });

        $(document).ready(function ($) {
            let messageIndex = 0;
            const chatContainer = $("#chat-container");

            // Animation for initial message
            $("#hello-text").t({
                speed: 20,
                blink: false,
                fin: function () {
                    $(".t-caret").fadeOut();
                }
            });

            function sendMessage() {
                const value = $("#data").val().trim();
                if (value === "") return;

                // Add User Message
                const userMsg = `
                    <div class="user-inbox inbox">
                        <div class="wrap">
                            <div class="icon">
                                <i class="fa-solid fa-user" style="color: #94a3b8; font-size: 20px; margin-top: 7px; margin-left: 8px;"></i>
                            </div>
                            <div class="msg-header">
                                <p>${value}</p>
                            </div>
                        </div>
                    </div>`;
                
                chatContainer.append(userMsg);
                $("#data").val("");
                chatContainer.scrollTop(chatContainer[0].scrollHeight);

                // Add Bot Loading Placeholder
                const botId = "chat-" + messageIndex;
                const botMsg = `
                    <div class="bot-inbox inbox">
                        <div class="wrap">
                            <div class="icon">
                                <img src="/chatbot/assets/img/asistan.png" alt="AI">
                            </div>
                            <div class="msg-header" id="${botId}">
                                <p><i class="fa-solid fa-ellipsis fa-fade"></i></p>
                            </div>
                        </div>
                    </div>`;
                
                chatContainer.append(botMsg);
                chatContainer.scrollTop(chatContainer[0].scrollHeight);

                $.ajax({
                    url: "message.php",
                    type: "POST",
                    data: { soru: value },
                    success: function (result) {
                        $(`#${botId}`).html(`<p>${result}</p>`);
                        $(`#${botId} p`).t({
                            speed: 15,
                            blink: false,
                            fin: function () {
                                $(".t-caret").fadeOut();
                            }
                        });
                        messageIndex++;
                        chatContainer.scrollTop(chatContainer[0].scrollHeight);
                    },
                    error: function() {
                        $(`#${botId}`).html(`<p>Üzgünüm, bir hata oluştu. Lütfen tekrar deneyin.</p>`);
                    }
                });
            }

            $("#send-btn").on("click", sendMessage);
            $("#data").keyup(function (event) {
                if (event.keyCode === 13) {
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
